<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Ciclo da Vida">

  <!-- MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ciclo da Vida">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Ciclo da Vida</title>

  <!-- SPLASH STYLE -->
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0D1B2A, #1B263B);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .splash {
      text-align: center;
      color: white;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      animation: pulse 2s infinite;
      box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
    }

    .logo img {
      width: 70px;
    }

    .title {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
    }

    .loader {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #4FC3F7;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div class="splash">
    <div class="logo">
      <img src="assets/assets/images/logo.png">
    </div>

    <div class="title">Ciclo da Vida</div>
    <div class="subtitle">Carregando sua jornada...</div>

    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- FLUTTER -->
  <script src="main.dart.js"></script>

  <!-- PWA SCRIPT COMPLETO -->
 <script>
  let deferredPrompt = null;
  let isInstalled = false;

  // Detecta instalação
  window.addEventListener('appinstalled', () => {
    isInstalled = true;
    console.log('PWA instalado');
  });

  // Detecta standalone
  if (window.matchMedia('(display-mode: standalone)').matches) {
    isInstalled = true;
  }

  // Evento Android install
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    // 🔥 avisa Flutter que pode instalar
    window.dispatchEvent(new Event('pwaInstallAvailable'));
  });

  function isIos() {
    return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
  }

  function isInStandaloneMode() {
    return ('standalone' in window.navigator) && window.navigator.standalone;
  }

  // 🔥 Flutter chama isso
  window.installPWA = async function () {

    if (isInstalled || isInStandaloneMode()) {
      alert("O app já está instalado 👍");
      return;
    }

    // Android
    if (deferredPrompt) {
      deferredPrompt.prompt();

      const choice = await deferredPrompt.userChoice;

      if (choice.outcome === 'accepted') {
        console.log('Usuário instalou');
      }

      deferredPrompt = null;
      return;
    }

    // iOS
    if (isIos()) {
      alert(
        "Para instalar:\n\n" +
        "1. Toque em compartilhar (📤)\n" +
        "2. 'Adicionar à Tela de Início'"
      );
      return;
    }

    alert("Instalação não disponível.");
  };

  // 🔥 Flutter consulta isso
  window.canInstallPWA = function () {
    return !!deferredPrompt;
  };
</script> 



</body>
</html>

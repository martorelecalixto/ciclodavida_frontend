name: sistrade
description: sistema de gerencimamento.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  fl_chart: ^1.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  bcrypt: ^1.1.3
  http: ^1.5.0
  mask_text_input_formatter: ^2.0.0
  intl: ^0.20.2
  syncfusion_flutter_pdf: ^31.1.18
  printing: ^5.12.0
  pdf: ^3.10.7
  pdf_text: ^0.5.0
  uuid: ^4.0.0
  flutter_multi_formatter: ^2.11.0
  universal_html: ^2.2.4

  csv: ^6.0.0
  excel: ^4.0.6
  file_picker: ^10.3.3
  path_provider: ^2.1.4
  open_filex: ^4.3.3
  xml: ^6.1.0

  qr_flutter: ^4.1.0

  flutter_localizations:
    sdk: flutter

dependency_overrides:
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ✅ SPLASH PROFISSIONAL
  flutter_native_splash: ^2.4.0

# ✅ CONFIGURAÇÃO DO SPLASH
flutter_native_splash:
  color: "#0D1B2A" # fundo escuro elegante
  image: assets/images/logo.png

  android: true
  ios: true
  web: true

  android_gravity: center
  ios_content_mode: center

  # opcional (deixa mais bonito em telas grandes)
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    #- assets/logo.png
    - assets/images/
    - assets/icons/
    - assets/logo-strive.png
